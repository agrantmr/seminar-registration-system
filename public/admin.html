<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Seminar Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .login-container h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            color: #333;
        }

        .dashboard {
            display: none;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .actions {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .actions button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }

        .actions button:hover {
            background: #5568d3;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .table-header h2 {
            font-size: 20px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f9f9f9;
        }

        th {
            padding: 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            color: #333;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.success {
            background: #d4edda;
            color: #155724;
        }

        .badge.pending {
            background: #fff3cd;
            color: #856404;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <h1>🔐 Admin Login</h1>

        <div class="message" id="loginMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       required
                       placeholder="Enter admin password">
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">
                Login
            </button>
        </form>
    </div>

    <!-- Dashboard -->
    <div class="container dashboard" id="dashboard">
        <div class="header">
            <h1>📊 Admin Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Registrations</h3>
                <div class="value" id="totalRegistrations">-</div>
            </div>
            <div class="stat-card">
                <h3>Available Seats</h3>
                <div class="value" id="availableSeats">-</div>
            </div>
            <div class="stat-card">
                <h3>Confirmations Sent</h3>
                <div class="value" id="confirmationsSent">-</div>
            </div>
        </div>

        <div class="actions">
            <button onclick="refreshData()">🔄 Refresh</button>
            <button onclick="exportCSV()">📥 Export CSV</button>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>Registrations</h2>
            </div>

            <div id="tableContent">
                <div class="loading">Loading registrations...</div>
            </div>
        </div>
    </div>

    <script>
        let authToken = null;

        // Check for saved token on load
        window.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('adminToken');
            if (savedToken) {
                authToken = savedToken;
                showDashboard();
            }
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginMessage = document.getElementById('loginMessage');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            loginMessage.classList.remove('show');

            try {
                const response = await fetch('/api/admin/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    showDashboard();
                } else {
                    loginMessage.textContent = data.error || 'Login failed';
                    loginMessage.classList.add('show', 'error');
                }
            } catch (error) {
                loginMessage.textContent = 'Network error. Please try again.';
                loginMessage.classList.add('show', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadDashboardData();
        }

        function logout() {
            authToken = null;
            localStorage.removeItem('adminToken');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('password').value = '';
        }

        async function loadDashboardData() {
            try {
                // Fetch seat info
                const seatsResponse = await fetch('/api/seats');
                const seatsData = await seatsResponse.json();

                // Fetch registrations
                const regResponse = await fetch('/api/admin/registrations', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (regResponse.status === 401) {
                    logout();
                    return;
                }

                const regData = await regResponse.json();

                // Update stats
                document.getElementById('totalRegistrations').textContent = seatsData.registeredSeats;
                document.getElementById('availableSeats').textContent = seatsData.availableSeats;

                const confirmationsSent = regData.registrations.filter(r => r.confirmation_sent).length;
                document.getElementById('confirmationsSent').textContent = confirmationsSent;

                // Render table
                renderTable(regData.registrations);
            } catch (error) {
                console.error('Error loading dashboard data:', error);
            }
        }

        function renderTable(registrations) {
            const tableContent = document.getElementById('tableContent');

            if (registrations.length === 0) {
                tableContent.innerHTML = '<div class="loading">No registrations yet.</div>';
                return;
            }

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Registered At</th>
                            <th>Confirmation</th>
                            <th>Week Reminder</th>
                            <th>Day Reminder</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${registrations.map(reg => `
                            <tr>
                                <td>${reg.id}</td>
                                <td>${reg.first_name}</td>
                                <td>${reg.email}</td>
                                <td>${new Date(reg.registered_at).toLocaleString()}</td>
                                <td><span class="badge ${reg.confirmation_sent ? 'success' : 'pending'}">
                                    ${reg.confirmation_sent ? 'Sent' : 'Pending'}
                                </span></td>
                                <td><span class="badge ${reg.week_reminder_sent ? 'success' : 'pending'}">
                                    ${reg.week_reminder_sent ? 'Sent' : 'Pending'}
                                </span></td>
                                <td><span class="badge ${reg.day_reminder_sent ? 'success' : 'pending'}">
                                    ${reg.day_reminder_sent ? 'Sent' : 'Pending'}
                                </span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            tableContent.innerHTML = html;
        }

        function refreshData() {
            document.getElementById('tableContent').innerHTML = '<div class="loading">Refreshing...</div>';
            loadDashboardData();
        }

        async function exportCSV() {
            try {
                const response = await fetch('/api/admin/export', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `registrations-${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error('Error exporting CSV:', error);
                alert('Failed to export CSV');
            }
        }
    </script>
</body>
</html>

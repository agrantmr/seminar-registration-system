<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Card - A5 QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .print-container {
            width: 148mm;
            height: 210mm;
            margin: 0 auto;
            background: white;
            display: flex;
            flex-direction: column;
            padding: 0;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #2d3d8a 0%, #1a2555 100%);
            color: white;
            padding: 15mm;
            display: flex;
            align-items: center;
            gap: 10mm;
            flex-shrink: 0;
        }

        .card-header-logo {
            width: 30mm;
            height: auto;
            flex-shrink: 0;
        }

        .card-header-text {
            flex: 1;
            min-width: 0;
        }

        .card-header-text h1 {
            font-size: 20pt;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 2mm;
        }

        .card-header-text p {
            font-size: 11pt;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            margin: 0;
        }

        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8mm;
            padding: 15mm 20mm;
            text-align: center;
        }

        .card-text {
            font-size: 18pt;
            font-weight: 700;
            color: #333;
            line-height: 1.3;
        }

        .qr-code-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-code {
            width: 60mm;
            height: 60mm;
            border: 2px solid #2d3d8a;
            padding: 1.5mm;
            background: white;
            display: block;
        }

        .card-price {
            font-size: 28pt;
            color: #ca1d26;
            font-weight: 700;
            margin: 0;
        }

        .card-footer {
            font-size: 9pt;
            color: #666;
            text-align: center;
            padding: 8mm 10mm;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        @media print {
            body {
                background: none;
                padding: 0;
            }

            .print-container {
                box-shadow: none;
                margin: 0;
            }
        }

        @media (max-width: 800px) {
            .print-container {
                width: 100%;
                height: auto;
                aspect-ratio: 148 / 210;
                max-width: 400px;
                padding: 0;
            }

            .card-header {
                padding: 10mm;
                gap: 8mm;
            }

            .card-header-logo {
                width: 25mm;
            }

            .card-header-text h1 {
                font-size: 16pt;
            }

            .card-header-text p {
                font-size: 10pt;
            }

            .card-content {
                padding: 12mm 15mm;
                gap: 6mm;
            }

            .card-text {
                font-size: 16pt;
            }

            .qr-code {
                width: 50mm;
                height: 50mm;
            }

            .card-price {
                font-size: 24pt;
            }

            .card-footer {
                padding: 6mm 8mm;
                font-size: 8pt;
            }
        }
    </style>
</head>
<body>
    <div class="print-container">
        <div class="card-header">
            <img src="https://pmpegodefnpnsdbbudcw.supabase.co/storage/v1/object/public/logos/At-Last-2.png"
                 alt="Seminar Logo"
                 class="card-header-logo">
            <div class="card-header-text">
                <h1>A Beginner's Guide to AI</h1>
                <p>"Demystifying AI for everyone"</p>
            </div>
        </div>

        <div class="card-content">
            <div class="card-text">
                Scan here to pay by card
            </div>

            <div class="qr-code-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=https://proseminars.org/pay.html"
                     alt="Payment QR Code"
                     class="qr-code">
            </div>

            <div class="card-price">
                £5.00 per person
            </div>
        </div>

        <div class="card-footer">
            ✓ Secure payment by Stripe
        </div>
    </div>

    <script>
        // Print dialog on load (optional - remove if you want to view first)
        // window.print();
    </script>
</body>
</html>

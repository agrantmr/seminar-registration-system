<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - A Beginner's Guide to AI Seminar</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: white;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .container {
            background: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            border: 1px solid #e0e0e0;
        }

        .header {
            padding: 30px;
            background: linear-gradient(135deg, #2d3d8a 0%, #1a2555 100%);
            color: white;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .header-image {
            width: 400px;
            height: auto;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .header-text {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .header-text h1 {
            font-size: 48px;
            margin-bottom: 12px;
            line-height: 1.2;
            font-weight: 700;
        }

        .header-text .tagline {
            font-size: 24px;
            opacity: 0.95;
            font-style: italic;
            line-height: 1.4;
        }

        .content {
            padding: 40px;
        }

        .payment-section {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .payment-section h2 {
            font-size: 26px;
            color: #2d3d8a;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .payment-section p {
            color: #333;
            line-height: 1.8;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 16px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2d3d8a;
        }

        .form-group select {
            cursor: pointer;
        }

        .quantity-info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #2d3d8a;
            margin-bottom: 20px;
            font-size: 16px;
            color: #333;
        }

        .price-display {
            font-size: 28px;
            font-weight: 700;
            color: #2d3d8a;
            margin-bottom: 20px;
        }

        #card-element {
            border: 2px solid #e0e0e0;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 40px;
        }

        #card-errors {
            color: #ca1d26;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ca1d26 0%, #d66d4b 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .success-message.show {
            display: block;
        }

        .success-message .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .success-message h2 {
            font-size: 32px;
            color: #2d3d8a;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .success-message p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
        }

        @media (max-width: 800px) {
            .header-image {
                width: 100%;
                max-width: 400px;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .header-text h1 {
                font-size: 32px;
            }

            .header-text .tagline {
                font-size: 20px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 0;
            }

            .container {
                border: none;
                box-shadow: none;
                border-radius: 0;
                margin: 0;
            }

            .header {
                padding: 20px;
                border-radius: 0;
            }

            .header-text h1 {
                font-size: 24px;
            }

            .header-text .tagline {
                font-size: 16px;
            }

            .content {
                padding: 30px 20px;
            }

            .payment-section {
                padding: 25px 20px;
            }

            .payment-section h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <img src="https://pmpegodefnpnsdbbudcw.supabase.co/storage/v1/object/public/logos/At-Last-2.png"
                     alt="Seminar Logo"
                     class="header-image">
                <div class="header-text">
                    <h1>A Beginner's Guide to AI</h1>
                    <p class="tagline">"Demystifying AI for everyone"</p>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="payment-section">
                <h2>💳 Pay by Card</h2>
                <p>Select the number of seats and complete your payment securely with Stripe.</p>

                <div class="message" id="message"></div>

                <form id="paymentForm">
                    <div class="form-group">
                        <label for="quantity">Number of Seats *</label>
                        <select id="quantity" required>
                            <option value="">Select number of seats</option>
                            <option value="1">1 seat - £5.00</option>
                            <option value="2">2 seats - £10.00</option>
                            <option value="3">3 seats - £15.00</option>
                            <option value="4">4 seats - £20.00</option>
                            <option value="5">5 seats - £25.00</option>
                            <option value="6">6 seats - £30.00</option>
                            <option value="7">7 seats - £35.00</option>
                            <option value="8">8 seats - £40.00</option>
                            <option value="9">9 seats - £45.00</option>
                            <option value="10">10 seats - £50.00</option>
                        </select>
                    </div>

                    <div class="quantity-info" id="quantityInfo" style="display: none;"></div>

                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text"
                               id="name"
                               name="name"
                               required
                               placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email"
                               id="email"
                               name="email"
                               required
                               placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label>Card Details *</label>
                        <div id="card-element"></div>
                        <div id="card-errors" role="alert"></div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        Complete Payment
                    </button>
                </form>

                <div class="success-message" id="successMessage">
                    <div class="icon">✅</div>
                    <h2>Payment Successful!</h2>
                    <p>Thank you for your payment. A confirmation email has been sent to you.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const stripe = Stripe('pk_live_WETGm4ZpbS8223up7fGdn7jo'); // Replace with your Stripe publishable key
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        const form = document.getElementById('paymentForm');
        const submitBtn = document.getElementById('submitBtn');
        const message = document.getElementById('message');
        const quantitySelect = document.getElementById('quantity');
        const quantityInfo = document.getElementById('quantityInfo');
        const successMessage = document.getElementById('successMessage');
        const cardErrors = document.getElementById('card-errors');

        const PRICE_ID = 'price_1T7eoXGf2Q3g0T8EJI646DCP';
        const PRICE_AMOUNT = 500; // £5.00 in pence

        // Update quantity display
        quantitySelect.addEventListener('change', function() {
            if (this.value) {
                const quantity = parseInt(this.value);
                const total = quantity * PRICE_AMOUNT / 100;
                quantityInfo.innerHTML = `<strong>Total: £${total.toFixed(2)}</strong>`;
                quantityInfo.style.display = 'block';
            } else {
                quantityInfo.style.display = 'none';
            }
        });

        // Handle card errors
        cardElement.on('change', function(event) {
            if (event.error) {
                cardErrors.textContent = event.error.message;
            } else {
                cardErrors.textContent = '';
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type} show`;
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const quantity = parseInt(quantitySelect.value);
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!quantity || !name || !email) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Processing...';
            message.classList.remove('show');

            try {
                // Create payment method
                const { paymentMethod, error: methodError } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                    billing_details: {
                        name: name,
                        email: email
                    }
                });

                if (methodError) {
                    showMessage(methodError.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Complete Payment';
                    return;
                }

                // Create checkout session
                const response = await fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        quantity: quantity,
                        name: name,
                        email: email,
                        paymentMethodId: paymentMethod.id
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(data.error || 'Payment failed. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Complete Payment';
                    return;
                }

                // Show success
                form.style.display = 'none';
                successMessage.classList.add('show');

            } catch (error) {
                showMessage('Network error. Please check your connection and try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Complete Payment';
            }
        });
    </script>

    <div style="text-align: center; padding: 20px; color: #666; font-size: 14px;">
        <a href="/privacy.html" style="color: #2d3d8a; text-decoration: none;">Privacy Policy</a>
        <span style="margin: 0 10px;">•</span>
        <span>Secure Payment by Stripe</span>
    </div>
</body>
</html>
